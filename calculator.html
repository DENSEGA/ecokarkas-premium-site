<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЭкоКаркас — Калькулятор стоимости дома</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--p:#5cc44d;--pd:#3a8f2b;--pl:#eafbe2;--s:#1e2d23;--g:#6b7280;--w:#fff;--b:#d8e8d4;--bg:#f7fdf5;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--s);min-height:100vh}
.top-bar{background:var(--s);color:var(--w);padding:16px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.top-bar h1{font-family:'Playfair Display',serif;font-size:24px;color:var(--p)}
.top-bar a{color:rgba(255,255,255,.6);font-size:13px;transition:color .2s}.top-bar a:hover{color:var(--p)}
.top-bar .phones{display:flex;gap:16px}.top-bar .phones a{color:var(--w);font-weight:700;font-size:14px;text-decoration:none}

.layout{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 56px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{max-height:50vh;overflow-y:auto}}

.sidebar{background:var(--w);border-right:1px solid var(--b);padding:28px;overflow-y:auto}
.sidebar h2{font-size:18px;font-weight:800;margin-bottom:20px;color:var(--s)}

.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--g);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group select,.form-group input[type=number]{width:100%;padding:11px 14px;border:1px solid var(--b);border-radius:8px;font-size:14px;font-family:inherit;background:var(--w);outline:none;transition:border .2s}
.form-group select:focus,.form-group input:focus{border-color:var(--p)}
.form-group .hint{font-size:11px;color:var(--g);margin-top:4px}

.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type=range]{flex:1;accent-color:var(--p)}
.range-val{font-size:18px;font-weight:800;color:var(--pd);min-width:50px;text-align:right}

.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--p);margin:24px 0 12px;padding-top:16px;border-top:1px solid var(--b)}
.section-title:first-of-type{border-top:none;margin-top:0}

.check-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.check-row input[type=checkbox]{accent-color:var(--p);width:16px;height:16px;flex-shrink:0}
.check-row label{font-size:13px;font-weight:500;cursor:pointer;flex:1}
.check-row .price-tag{font-size:12px;color:var(--g);white-space:nowrap}

.main{padding:32px 40px;overflow-y:auto}
@media(max-width:900px){.main{padding:20px}}

.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.s-card{background:var(--w);border:1px solid var(--b);border-radius:var(--r);padding:20px;transition:border-color .2s}
.s-card:hover{border-color:var(--p)}
.s-card .label{font-size:11px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.s-card .value{font-size:28px;font-weight:800;color:var(--s)}
.s-card .value span{color:var(--p)}
.s-card.total{background:linear-gradient(135deg,var(--s),#24392f);border-color:transparent;color:var(--w)}
.s-card.total .label{color:rgba(255,255,255,.5)}
.s-card.total .value{color:var(--w);font-size:32px}
.s-card.total .value span{color:var(--p)}

.breakdown{background:var(--w);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.breakdown h3{padding:16px 20px;font-size:15px;font-weight:700;background:var(--pl);border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
.breakdown h3 .cat-total{font-size:14px;font-weight:800;color:var(--pd)}
.b-row{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px}
.b-row:last-child{border-bottom:none}
.b-row .b-name{color:var(--s);flex:1}
.b-row .b-qty{color:var(--g);min-width:80px;text-align:center}
.b-row .b-price{font-weight:700;min-width:100px;text-align:right;color:var(--pd)}
.b-row:hover{background:var(--pl)}

.btn-calc{width:100%;padding:14px;background:var(--p);color:var(--w);border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:12px}
.btn-calc:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 6px 20px rgba(92,196,77,.3)}

.disclaimer{text-align:center;font-size:12px;color:var(--g);margin-top:24px;line-height:1.6}

.empty-state{text-align:center;padding:80px 20px;color:var(--g)}
.empty-state .icon{font-size:64px;margin-bottom:16px}
.empty-state h3{font-size:20px;font-weight:700;color:var(--s);margin-bottom:8px}
</style>
</head>
<body>

<div class="top-bar">
  <h1>ЭкоКаркас</h1>
  <div class="phones">
    <a href="tel:+79932707373">+7 (993) 270-73-73</a>
    <a href="tel:+79932707272">+7 (993) 270-72-72</a>
  </div>
  <a href="https://densega.github.io/ecokarkas-premium-site/" target="_blank">&#8592; На сайт</a>
</div>

<div class="layout">
<div class="sidebar">
  <h2>Параметры дома</h2>

  <div class="form-group">
    <label>Тип каркаса</label>
    <select id="frameType">
      <option value="1floor">1 этаж</option>
      <option value="2floor" selected>2 этажа</option>
      <option value="15floor">1.5 этажа (мансарда)</option>
      <option value="aframe">A-frame (шалаш)</option>
      <option value="module1">Модульный (1 модуль)</option>
      <option value="module2">Модульный (2 модуля)</option>
      <option value="module3">Модульный (3 модуля)</option>
    </select>
  </div>

  <div class="form-group">
    <label>Комплектация</label>
    <select id="tier">
      <option value="std">Стандарт</option>
      <option value="plus" selected>Стандарт+</option>
    </select>
  </div>

  <div class="form-group">
    <label>Площадь дома (м&#178;)</label>
    <div class="range-row">
      <input type="range" id="area" min="30" max="300" value="100">
      <div class="range-val" id="areaVal">100</div>
    </div>
  </div>

  <div class="form-group">
    <label>Высота стен (м)</label>
    <input type="number" id="wallH" value="2.7" step="0.1" min="2.3" max="4">
  </div>

  <div class="form-group">
    <label>Количество окон</label>
    <input type="number" id="winCount" value="8" min="0" max="30">
  </div>

  <div class="form-group">
    <label>Межкомнатные двери</label>
    <input type="number" id="doorCount" value="5" min="0" max="15">
  </div>

  <div class="section-title">Фундамент</div>
  <div class="form-group">
    <label>Тип свай</label>
    <select id="pileType">
      <option value="v89">Винтовые 89x2500</option>
      <option value="v108" selected>Винтовые 108x2500</option>
      <option value="jb150_3">ЖБ 150x150/3000</option>
      <option value="jb150_4">ЖБ 150x150/4000</option>
      <option value="jb200_3">ЖБ 200x200/3000</option>
      <option value="jb200_4">ЖБ 200x200/4000</option>
    </select>
  </div>

  <div class="section-title">Кровля</div>
  <div class="form-group">
    <label>Тип кровли</label>
    <select id="roofMat">
      <option value="prof">Профнастил</option>
      <option value="metal" selected>Металлочерепица</option>
      <option value="soft">Мягкая кровля</option>
    </select>
  </div>
  <div class="form-group">
    <label>Форма крыши</label>
    <select id="roofShape">
      <option value="dual" selected>Двускатная</option>
      <option value="single">Односкатная</option>
      <option value="hip">Вальмовая</option>
      <option value="flat">Плоская</option>
    </select>
  </div>

  <div class="section-title">Фасад</div>
  <div class="form-group">
    <label>Тип фасада</label>
    <select id="facade">
      <option value="imit_nopaint">Имитация бруса (без покраски)</option>
      <option value="metal" selected>Металлический сайдинг</option>
      <option value="imit">Имитация бруса (окрашенная)</option>
      <option value="hauberk">Плитка Hauberk</option>
      <option value="stucco">Штукатурка (мокрый фасад)</option>
      <option value="combo_md">Комби: металл + дерево</option>
      <option value="combo_ms">Комби: металл + штукатурка</option>
    </select>
  </div>

  <div class="section-title">Окна</div>
  <div class="form-group">
    <label>Тип окон</label>
    <select id="winType">
      <option value="white" selected>ПВХ белые</option>
      <option value="lam1">ПВХ ламинация 1 сторона</option>
      <option value="lam2">ПВХ ламинация 2 стороны</option>
    </select>
  </div>

  <div class="section-title">Входная дверь</div>
  <div class="form-group">
    <label>Тип двери</label>
    <select id="entryDoor">
      <option value="eco">Эконом</option>
      <option value="std" selected>Стандарт</option>
      <option value="prem">Премиум</option>
      <option value="plastic">Пластиковая</option>
    </select>
  </div>

  <div class="section-title">Внутренняя отделка</div>
  <div class="form-group">
    <label>Стены</label>
    <select id="wallFinish">
      <option value="none">Без отделки</option>
      <option value="gkl">Гипсокартон</option>
      <option value="vag" selected>Вагонка</option>
      <option value="plaster">Штукатурка</option>
      <option value="paint">Покраска</option>
    </select>
  </div>
  <div class="form-group">
    <label>Потолок</label>
    <select id="ceilingFinish">
      <option value="none">Без отделки</option>
      <option value="vag" selected>Вагонка</option>
      <option value="stretch">Натяжной</option>
    </select>
  </div>
  <div class="form-group">
    <label>Пол</label>
    <select id="floorFinish">
      <option value="none">Без отделки</option>
      <option value="lino">Линолеум</option>
      <option value="lam" selected>Ламинат</option>
      <option value="kvarts">Кварцвинил</option>
    </select>
  </div>

  <div class="section-title">Дополнительно</div>
  <div class="check-row"><input type="checkbox" id="chkTerrace"><label for="chkTerrace">Терраса открытая (20 м&#178;)</label></div>
  <div class="check-row"><input type="checkbox" id="chkSeptic"><label for="chkSeptic">Септик под ключ</label></div>
  <div class="check-row"><input type="checkbox" id="chkWell"><label for="chkWell">Скважина / насос</label></div>
  <div class="check-row"><input type="checkbox" id="chkHeat"><label for="chkHeat">Отопление (электрокотёл)</label></div>
  <div class="check-row"><input type="checkbox" id="chkElectric"><label for="chkElectric">Электрика полностью</label></div>
  <div class="check-row"><input type="checkbox" id="chkPlumb"><label for="chkPlumb">Сантехника (6 точек)</label></div>
  <div class="check-row"><input type="checkbox" id="chkVent"><label for="chkVent">Вентиляция</label></div>
  <div class="check-row"><input type="checkbox" id="chkSteps"><label for="chkSteps">Крыльцо / ступени</label></div>

  <button class="btn-calc" onclick="calc()">Рассчитать стоимость</button>
</div>

<div class="main" id="main">
  <div class="empty-state">
    <div class="icon">&#127968;</div>
    <h3>Настройте параметры</h3>
    <p>Выберите опции слева и нажмите «Рассчитать»</p>
  </div>
</div>
</div>

<script>
function calc(){
  var area=+document.getElementById('area').value;
  var wallH=+document.getElementById('wallH').value;
  var winCount=+document.getElementById('winCount').value;
  var doorCount=+document.getElementById('doorCount').value;
  var tier=document.getElementById('tier').value;
  var ft=document.getElementById('frameType').value;

  // Derived
  var perimeter=Math.sqrt(area)*4; // approximate
  var wallArea=perimeter*wallH;
  var roofArea=area*1.15; // slope factor
  var pileCount=Math.ceil(area/2*1.5);
  var winArea=winCount*1.5; // avg window 1.5m2

  var items=[];

  // FOUNDATION
  var pilePrices={v89:5000,v108:6500,jb150_3:8500,jb150_4:9500,jb200_3:10000,jb200_4:12500};
  var pt=document.getElementById('pileType').value;
  items.push({cat:'Фундамент',name:'Сваи',qty:pileCount,unit:'шт',price:pilePrices[pt]});
  items.push({cat:'Фундамент',name:'Оголовки',qty:pileCount,unit:'шт',price:250});
  items.push({cat:'Фундамент',name:'Монтаж свай',qty:pileCount,unit:'шт',price:2500});
  var bindPrice=tier==='plus'?1500:1000;
  items.push({cat:'Фундамент',name:'Обвязка доской',qty:area,unit:'п.м.',price:bindPrice});

  // FRAME
  var framePrice=0,frameName='';
  if(ft==='1floor'){framePrice=tier==='plus'?55000:38000;frameName='Каркас 1 этаж'}
  else if(ft==='2floor'){framePrice=tier==='plus'?55000:38000;frameName='Каркас 2 этажа'}
  else if(ft==='15floor'){framePrice=40000;frameName='Каркас 1.5 этажа'}
  else if(ft==='aframe'){framePrice=40000;frameName='Каркас A-frame'}
  else if(ft==='module1'){items.push({cat:'Каркас',name:'Модуль (1 шт)',qty:1,unit:'шт',price:500000});framePrice=0}
  else if(ft==='module2'){items.push({cat:'Каркас',name:'Модули (2 шт)',qty:1,unit:'шт',price:1000000});framePrice=0}
  else if(ft==='module3'){items.push({cat:'Каркас',name:'Модули (3 шт)',qty:1,unit:'шт',price:1500000});framePrice=0}
  if(framePrice>0)items.push({cat:'Каркас',name:frameName,qty:area,unit:'м2',price:framePrice});

  // INSULATION
  var insWall=tier==='plus'?750:500;
  items.push({cat:'Утепление',name:'Утепление стен '+(tier==='plus'?'200':'150')+' мм',qty:Math.round(wallArea),unit:'м2',price:insWall});
  items.push({cat:'Утепление',name:'Утепление кровли 200 мм',qty:Math.round(roofArea),unit:'м2',price:750});
  items.push({cat:'Утепление',name:'Утепление пола 200 мм',qty:area,unit:'м2',price:750});
  items.push({cat:'Утепление',name:'Пароизоляция',qty:Math.round(wallArea+roofArea+area),unit:'м2',price:150});
  items.push({cat:'Утепление',name:'Ветрозащита',qty:Math.round(wallArea+roofArea+area),unit:'м2',price:100});

  // ROOF
  var roofPrices={prof:2500,metal:3500,soft:4500};
  var rm=document.getElementById('roofMat').value;
  items.push({cat:'Кровля',name:'Кровельное покрытие',qty:Math.round(roofArea),unit:'м2',price:roofPrices[rm]});
  if(ft!=='aframe')items.push({cat:'Кровля',name:'Стропильная система',qty:Math.round(roofArea),unit:'м2',price:1800});
  items.push({cat:'Кровля',name:'Водосточная система',qty:Math.round(perimeter),unit:'п.м.',price:2500});
  items.push({cat:'Кровля',name:'Подшивка свесов',qty:Math.round(perimeter),unit:'п.м.',price:3500});

  // FACADE
  var facadePrices={imit_nopaint:1500,metal:3000,imit:3000,hauberk:2500,stucco:4500,combo_md:3200,combo_ms:3500};
  var fc=document.getElementById('facade').value;
  items.push({cat:'Фасад',name:'Фасадная отделка',qty:Math.round(wallArea),unit:'м2',price:facadePrices[fc]});

  // WINDOWS
  var winPrices={white:11000,lam1:13000,lam2:15000};
  var wt=document.getElementById('winType').value;
  items.push({cat:'Окна',name:'Окна ПВХ',qty:Math.round(winArea),unit:'м2',price:winPrices[wt]});
  items.push({cat:'Окна',name:'Монтаж окон',qty:Math.round(winArea),unit:'м2',price:5500});
  items.push({cat:'Окна',name:'Откосы и подоконники',qty:winCount,unit:'шт',price:7000});

  // ENTRY DOOR
  var doorPrices={eco:36000,std:42000,prem:80000,plastic:42000};
  var ed=document.getElementById('entryDoor').value;
  items.push({cat:'Входная дверь',name:'Дверь входная',qty:1,unit:'шт',price:doorPrices[ed]});
  items.push({cat:'Входная дверь',name:'Монтаж входной двери',qty:1,unit:'шт',price:12000});

  // INTERIOR
  var wf=document.getElementById('wallFinish').value;
  var wfPrices={gkl:1000,vag:3000,plaster:1200,paint:1500};
  if(wf!=='none')items.push({cat:'Внутренняя отделка',name:'Отделка стен',qty:Math.round(wallArea),unit:'м2',price:wfPrices[wf]});

  var cf=document.getElementById('ceilingFinish').value;
  var cfPrices={vag:3500,stretch:1800};
  if(cf!=='none')items.push({cat:'Внутренняя отделка',name:'Потолок',qty:area,unit:'м2',price:cfPrices[cf]});

  var ff=document.getElementById('floorFinish').value;
  var ffPrices={lino:2500,lam:3000,kvarts:4500};
  if(ff!=='none')items.push({cat:'Внутренняя отделка',name:'Напольное покрытие',qty:area,unit:'м2',price:ffPrices[ff]});

  if(doorCount>0){
    items.push({cat:'Внутренняя отделка',name:'Двери межкомнатные (стандарт)',qty:doorCount,unit:'шт',price:18000});
    items.push({cat:'Внутренняя отделка',name:'Монтаж межкомн. дверей',qty:doorCount,unit:'шт',price:8000});
  }

  items.push({cat:'Внутренняя отделка',name:'Плинтус + монтаж',qty:Math.round(perimeter*2),unit:'п.м.',price:350});

  // EXTRAS
  if(document.getElementById('chkTerrace').checked)items.push({cat:'Доп. работы',name:'Терраса открытая 20 м2',qty:20,unit:'м2',price:20000});
  if(document.getElementById('chkSeptic').checked)items.push({cat:'Доп. работы',name:'Септик под ключ',qty:1,unit:'компл.',price:250000});
  if(document.getElementById('chkWell').checked)items.push({cat:'Доп. работы',name:'Скважина / насос',qty:1,unit:'компл.',price:350000});
  if(document.getElementById('chkHeat').checked){
    items.push({cat:'Отопление',name:'Электрокотёл',qty:1,unit:'шт',price:100000});
    items.push({cat:'Отопление',name:'Радиаторы (секции)',qty:Math.round(area/2),unit:'шт',price:1500});
    items.push({cat:'Отопление',name:'Трубы отопления',qty:Math.round(area*1.5),unit:'п.м.',price:300});
    items.push({cat:'Отопление',name:'Расш. бак + насос',qty:1,unit:'компл.',price:30000});
    items.push({cat:'Отопление',name:'Монтаж отопления',qty:area,unit:'м2',price:2500});
  }
  if(document.getElementById('chkElectric').checked){
    items.push({cat:'Электрика',name:'Щиток + автоматы + УЗО',qty:1,unit:'компл.',price:30000});
    items.push({cat:'Электрика',name:'Кабель + гофра',qty:Math.round(area*3),unit:'п.м.',price:500});
    items.push({cat:'Электрика',name:'Розетки/выкл./свет',qty:Math.round(area/3),unit:'точек',price:2500});
    items.push({cat:'Электрика',name:'Заземление + ввод',qty:1,unit:'компл.',price:65000});
  }
  if(document.getElementById('chkPlumb').checked){
    items.push({cat:'Сантехника',name:'Трубы ХВС/ГВС + канализация',qty:Math.round(area*0.5),unit:'п.м.',price:600});
    items.push({cat:'Сантехника',name:'Точки водосн.+канал.+монтаж',qty:6,unit:'точек',price:13500});
  }
  if(document.getElementById('chkVent').checked)items.push({cat:'Доп. работы',name:'Вентиляция (комплект)',qty:1,unit:'компл.',price:130000});
  if(document.getElementById('chkSteps').checked)items.push({cat:'Доп. работы',name:'Крыльцо / ступени',qty:1,unit:'компл.',price:35000});

  // GROUP BY CATEGORY
  var cats={};var totalSum=0;
  items.forEach(function(it){
    if(!cats[it.cat])cats[it.cat]={items:[],total:0};
    var sum=it.qty*it.price;
    cats[it.cat].items.push({name:it.name,qty:it.qty,unit:it.unit,price:it.price,sum:sum});
    cats[it.cat].total+=sum;
    totalSum+=sum;
  });

  // RENDER
  var html='';
  html+='<div class="summary-cards">';
  html+='<div class="s-card"><div class="label">Площадь</div><div class="value">'+area+' <span>м&#178;</span></div></div>';
  html+='</div>';

  var catOrder=['Фундамент','Каркас','Утепление','Кровля','Фасад','Окна','Входная дверь','Внутренняя отделка','Отопление','Электрика','Сантехника','Доп. работы'];
  catOrder.forEach(function(cn){
    var c=cats[cn];if(!c)return;
    html+='<div class="breakdown"><h3>'+cn+'</h3>';
    c.items.forEach(function(it){
      html+='<div class="b-row"><span class="b-name">'+it.name+'</span></div>';
    });
    html+='</div>';
  });

  html+='<div class="summary-cards" style="margin-bottom:24px">';
  html+='<div class="s-card total"><div class="label">Итого стоимость</div><div class="value"><span>'+fmt(totalSum)+'</span> &#8381;</div></div>';
  html+='</div>';

  html+='<div style="padding:24px;background:linear-gradient(135deg,var(--s),#24392f);border-radius:var(--r);text-align:center">';
  html+='<div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:6px">&#9888; Предварительный расчёт</div>';
  html+='<div style="font-size:16px;color:var(--w);line-height:1.7;max-width:500px;margin:0 auto;margin-bottom:20px">Указанная стоимость является <b style="color:var(--p)">ориентировочной</b>. Оставьте контакты — мы перезвоним и уточним детали.</div>';
  html+='<div style="max-width:400px;margin:0 auto;text-align:left">';
  html+='<input id="cName" placeholder="Ваше имя" style="width:100%;padding:12px 14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:var(--w);font-size:14px;outline:none;font-family:inherit">';
  html+='<input id="cPhone" placeholder="Телефон" style="width:100%;padding:12px 14px;margin-bottom:14px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:var(--w);font-size:14px;outline:none;font-family:inherit">';
  html+='<button onclick="sendCalc('+totalSum+')" style="width:100%;padding:14px;background:var(--p);color:var(--w);border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Отправить расчёт</button>';
  html+='</div></div>';

  // Save categories for telegram send
  window._calcCats=catOrder.filter(function(cn){return cats[cn]}).map(function(cn){return cn+': '+cats[cn].items.map(function(it){return it.name}).join(', ')});

  document.getElementById('main').innerHTML=html;
}

function sendCalc(total){
  var n=document.getElementById('cName').value.trim();
  var p=document.getElementById('cPhone').value.trim();
  if(!n||!p){alert('Заполните имя и телефон');return}
  var txt='&#128200; Расчёт с сайта!\n\n&#128100; '+n+'\n&#128222; '+p+'\n&#128176; Итого: '+fmt(total)+' руб.\n\n';
  if(window._calcCats)txt+=window._calcCats.join('\n');
  txt+='\n\n&#128197; '+new Date().toLocaleString('ru-RU');
  fetch('https://api.telegram.org/bot7833693424:AAGzu0NPuOpyS9LVEozEeT347s6jemxKD_M/sendMessage',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:'6510898129',text:txt})
  }).then(function(){alert('Спасибо! Мы свяжемся с вами и уточним детали расчёта.')}).catch(function(){alert('Спасибо! Позвоните нам: +7(993)270-73-73')});
}

function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}

// Live area slider
document.getElementById('area').oninput=function(){document.getElementById('areaVal').textContent=this.value};

// Auto-calc on load
calc();
</script>
</body>
</html>
